name: Deploy to Production (with Approval)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  request-approval:
    uses: qiliangjia/qlj-action-tools/.github/workflows/request-approval.yml@main
    with:
      # Core parameters
      project_name: qlj-devhub-homepage
      mode: workers
      environment: production

      # Build parameters
      build_command: pnpm install && pnpm run build
      build_dir: build

      # Approval parameters
      approver_user_ids: ${{ vars.APPROVER_USER_IDS }}
      chat_id: ${{ vars.FEISHU_CHAT_ID }}
      app_name: dev

      # Git parameters
      branch: ${{ github.ref_name }}
      commit_sha: ${{ github.sha }}
