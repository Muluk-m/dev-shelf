name: Deploy to Production (with Approval)

on:
  workflow_dispatch:
    inputs:
      deploy_title:
        description: "本次部署内容（一句话）"
        required: true
        type: string
      skip_approval:
        description: "是否跳过审批直接部署"
        required: false
        type: boolean
        default: false

jobs:
  request-approval:
    if: ${{ !inputs.skip_approval }}
    uses: qiliangjia/qlj-action-tools/.github/workflows/request-approval.yml@main
    with:
      platform: cloudflare
      environment: production
      deploy_title: ${{ inputs.deploy_title }}
      deploy_config: '{"project_name":"qlj-devhub-homepage","mode":"workers"}'
      build_command: pnpm install && pnpm run build
      build_dir: build
      approver_user_ids: ${{ vars.APPROVER_USER_IDS }}
      chat_id: ${{ vars.FEISHU_CHAT_ID }}
      app_name: dev

  deploy-direct:
    if: ${{ inputs.skip_approval }}
    uses: qiliangjia/qlj-action-tools/.github/workflows/deploy.yml@main
    with:
      project_name: qlj-devhub-homepage
      mode: workers
      environment: production
      build_command: pnpm install && pnpm run build
      build_dir: build
      deploy_title: ${{ inputs.deploy_title }}
      chat_id: ${{ vars.FEISHU_CHAT_ID }}
      app_name: dev
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
