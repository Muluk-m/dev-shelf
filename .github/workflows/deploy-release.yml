name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      deploy_title:
        description: "本次部署内容（一句话）"
        required: true
        type: string
      skip_approval:
        description: "是否跳过审批直接部署"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [cloudflare-deploy-approved]

jobs:
  release:
    if: github.event_name == 'workflow_dispatch'
    uses: qiliangjia/qlj-action-tools/.github/workflows/cloudflare-deploy-release.yml@main
    with:
      project_name: qlj-devhub-homepage
      mode: workers
      deploy_title: ${{ inputs.deploy_title }}
      skip_approval: ${{ inputs.skip_approval }}
      build_dir: build
      approver_user_ids: ${{ vars.APPROVER_USER_IDS }}
      chat_id: ${{ vars.FEISHU_CHAT_ID }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-approved:
    if: github.event_name == 'repository_dispatch'
    uses: qiliangjia/qlj-action-tools/.github/workflows/deploy.yml@main
    with:
      context_base64: ${{ github.event.client_payload.context }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
