name: Deploy Preview

on:
  push:
    branches:
      - test/*
      - test-*
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment name"
        required: false
        default: "preview"
        type: choice
        options:
          - preview
          - staging

jobs:
  deploy:
    uses: qiliangjia/qlj-action-tools/.github/workflows/deploy.yml@main
    with:
      project_name: qlj-devhub-homepage
      mode: workers
      environment: ${{ inputs.environment || 'preview' }}
      build_command: pnpm install && pnpm run build
      build_dir: build
      chat_id: ${{ vars.FEISHU_CHAT_ID }}
      app_name: dev
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
