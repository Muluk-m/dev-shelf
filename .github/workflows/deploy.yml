name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: qiliangjia/qlj-action-tools/.github/workflows/cloudflare-deploy.yml@main
    with:
      # 核心参数
      project_name: qlj-devhub-homepage
      mode: workers

      # 审批配置
      require_approval: true
      approval_environment: production
      approval_message: "Deploy qlj-devhub-homepage to production"

      # 通知配置
      enable_notifications: true
      webhook_url: ${{ vars.FEISHU_WEBHOOK_URL }}
      notification_env: production

      # 版本信息
      version: ${{ github.sha }}
      repository: ${{ github.repository }}
    secrets: inherit
